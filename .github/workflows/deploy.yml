name: Deploy to Production

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @yourgift/shared run build

      - name: Build midocean
        run: pnpm --filter @yourgift/midocean run build

      - name: Build pf-concept
        run: pnpm --filter @yourgift/pf-concept run build

      - name: Prisma generate
        working-directory: services/api
        run: pnpm exec prisma generate

      - name: Type-check API
        run: pnpm --filter api exec tsc --noEmit

      - name: Type-check Web
        run: pnpm --filter web exec tsc --noEmit

      - name: Type-check Admin
        run: pnpm --filter admin exec tsc --noEmit

      - name: Build API
        run: pnpm --filter api run build

  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @yourgift/shared run build

      - name: Build midocean
        run: pnpm --filter @yourgift/midocean run build

      - name: Build pf-concept
        run: pnpm --filter @yourgift/pf-concept run build

      - name: Prisma generate and validate
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
        run: |
          pnpm exec prisma generate
          pnpm exec prisma validate

      - name: Check env vars documented
        run: |
          REQUIRED_VARS="DATABASE_URL DIRECT_URL JWT_SECRET STRIPE_KEY RESEND_API_KEY AWS_ACCESS_KEY_ID UPSTASH_REDIS_URL"
          for var in $REQUIRED_VARS; do
            grep -q "^${var}=" services/api/.env.example || (echo "Missing in .env.example: $var" && exit 1)
          done
          echo "All required env vars documented"

      - name: Check readiness report exists
        run: test -f SYSTEM_READINESS_REPORT.md && echo "OK" || (echo "SYSTEM_READINESS_REPORT.md missing" && exit 1)

      - name: Check integration tests exist
        run: |
          for f in reconciliation circuit-breaker rate-limit saml health-deep; do
            test -f "services/api/test/integration/${f}.test.ts" && echo "${f}: ok" || (echo "Missing: ${f}.test.ts" && exit 1)
          done

  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Trigger Render deploy for yourgift-api
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_API_SERVICE_ID" ]; then
            echo "RENDER_API_KEY or RENDER_API_SERVICE_ID not set - skipping"
            echo "Set in: GitHub Settings > Secrets > Actions"
            echo "RENDER_API_SERVICE_ID = srv-d87o4q0jo6nc73cpdue0"
            exit 0
          fi
          curl -sf \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            "https://api.render.com/v1/services/$RENDER_API_SERVICE_ID/deploys"

  deploy-web:
    name: Deploy Web to Render
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Trigger Render deploy for yourgift-web
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_WEB_SERVICE_ID: ${{ secrets.RENDER_WEB_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_WEB_SERVICE_ID" ]; then
            echo "RENDER_API_KEY or RENDER_WEB_SERVICE_ID not set - skipping"
            exit 0
          fi
          curl -sf \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            "https://api.render.com/v1/services/$RENDER_WEB_SERVICE_ID/deploys"

  summary:
    name: Deploy summary
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| yourgift-api | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| yourgift-web | ${{ needs.deploy-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
