name: Deploy to AWS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com

jobs:
  # ── Test & Lint ──────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @yourgift/api exec prisma generate

      - name: Build all packages
        run: pnpm build

      - name: Lint
        run: pnpm lint

  # ── Build & Push to ECR ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    outputs:
      api_image: ${{ steps.meta-api.outputs.image }}
      web_image: ${{ steps.meta-web.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Prisma client before build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @yourgift/api exec prisma generate

      - name: Build and push API image
        id: meta-api
        run: |
          IMAGE=$ECR_REGISTRY/yourgift-api:${{ github.sha }}
          docker build \
            -f docker/api.Dockerfile \
            -t $IMAGE \
            -t $ECR_REGISTRY/yourgift-api:latest \
            .
          docker push $IMAGE
          docker push $ECR_REGISTRY/yourgift-api:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and push Web image
        id: meta-web
        run: |
          IMAGE=$ECR_REGISTRY/yourgift-web:${{ github.sha }}
          docker build \
            -f docker/web.Dockerfile \
            -t $IMAGE \
            -t $ECR_REGISTRY/yourgift-web:latest \
            .
          docker push $IMAGE
          docker push $ECR_REGISTRY/yourgift-web:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Run Prisma Migrations ────────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch DATABASE_URL from Secrets Manager
        id: get-secret
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id yourgift/production/api \
            --query SecretString \
            --output text)
          DATABASE_URL=$(echo $SECRET | jq -r '.DATABASE_URL')
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> $GITHUB_ENV

      - name: Run Prisma migrations
        run: pnpm --filter @yourgift/api exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ── Deploy to ECS ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: [build-and-push, migrate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ECS task definition with new image tag
        run: |
          # Fetch current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition yourgift-api \
            --query taskDefinition)

          # Inject new image into container definition
          NEW_IMAGE="$ECR_REGISTRY/yourgift-api:${{ github.sha }}"
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)')

          # Register updated task definition
          aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF"

      - name: Deploy API to ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster yourgift-production \
            --service yourgift-api \
            --force-new-deployment

      - name: Wait for API deployment to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster yourgift-production \
            --services yourgift-api

      - name: Notify deployment complete
        run: |
          echo "Deployed commit ${{ github.sha }} to production"
          echo "API image: $ECR_REGISTRY/yourgift-api:${{ github.sha }}"
