name: Deploy to Production

on:
  push:
    branches: [main, master]

jobs:
  # ── Type Check & Build ──────────────────────────────────────────────────────
  ci:
    name: CI — Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @yourgift/shared run build

      - name: Generate Prisma client
        working-directory: services/api
        run: pnpm exec prisma generate

      - name: Type check API
        working-directory: services/api
        run: pnpm exec tsc --noEmit

      - name: Build API
        working-directory: services/api
        run: pnpm run build

  # ── Deploy API → Railway ─────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API to Railway
        working-directory: services/api
        run: railway up --service yourgift-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy Web → Vercel ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Deploy Web to Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

  # ── Deploy Admin → Vercel ────────────────────────────────────────────────────
  deploy-admin:
    name: Deploy Admin → Vercel
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Deploy Admin to Vercel
        working-directory: apps/admin
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
