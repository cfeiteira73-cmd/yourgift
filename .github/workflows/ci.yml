name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared packages (required before tsc)
        run: |
          pnpm --filter @yourgift/shared run build
          pnpm --filter @yourgift/midocean run build
          pnpm --filter @yourgift/pf-concept run build

      - name: Generate Prisma client
        working-directory: services/api
        run: pnpm exec prisma generate

      - name: TypeCheck API
        run: pnpm --filter api exec tsc --noEmit

      - name: TypeCheck Admin
        run: pnpm --filter admin exec tsc --noEmit

      - name: TypeCheck Web
        run: pnpm --filter web exec tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @yourgift/shared run build

      - name: Lint API
        run: pnpm --filter api run lint || true

      - name: Lint Admin
        run: pnpm --filter admin run lint || true

      - name: Lint Web
        run: pnpm --filter web run lint || true

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @yourgift/shared run build

      - name: Build midocean integration
        run: pnpm --filter @yourgift/midocean run build

      - name: Build pf-concept integration
        run: pnpm --filter @yourgift/pf-concept run build

      - name: Generate Prisma client
        working-directory: services/api
        run: pnpm exec prisma generate

      - name: Build API
        run: pnpm --filter api run build

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: services/api/dist/
          retention-days: 1

  build-admin:
    name: Build Admin
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @yourgift/shared run build

      - name: Build Admin
        run: pnpm --filter admin run build

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @yourgift/shared run build

      - name: Build Web
        run: pnpm --filter web run build

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [build-api]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Generate SBOM with @cyclonedx/cyclonedx-npm
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom.json --package-lock-only || true
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 30
