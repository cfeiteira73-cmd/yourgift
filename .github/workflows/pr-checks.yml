name: PR Checks

on:
  pull_request:
    branches: [main, master, develop]

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── TypeCheck ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @yourgift/shared run build
          pnpm --filter @yourgift/midocean run build
          pnpm --filter @yourgift/pf-concept run build

      - name: Generate Prisma client
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm exec prisma generate

      - name: TypeCheck — API
        run: pnpm --filter api exec tsc --noEmit

      - name: TypeCheck — Admin
        run: pnpm --filter admin exec tsc --noEmit

      - name: TypeCheck — Web
        run: pnpm --filter web exec tsc --noEmit

      - name: TypeCheck — Shared packages
        run: pnpm --filter @yourgift/shared exec tsc --noEmit || true

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @yourgift/shared run build
          pnpm --filter @yourgift/midocean run build
          pnpm --filter @yourgift/pf-concept run build

      - name: Lint — API
        run: pnpm --filter api run lint || true

      - name: Lint — Admin
        run: pnpm --filter admin run lint || true

      - name: Lint — Web
        run: pnpm --filter web run lint || true

  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @yourgift/shared run build
          pnpm --filter @yourgift/midocean run build
          pnpm --filter @yourgift/pf-concept run build

      - name: Generate Prisma client
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm exec prisma generate

      - name: Run Jest unit tests
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          JWT_SECRET: ci-test-secret-not-for-production
          STRIPE_SECRET_KEY: sk_test_placeholder
          REDIS_URL: redis://localhost:6379
        run: pnpm test --passWithNoTests

      - name: Write test summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Tests executed via Jest on services/api/src/**/*.spec.ts" >> $GITHUB_STEP_SUMMARY

  # ── Security Scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Secrets Pattern)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded secrets patterns
        id: secret-scan
        run: |
          set +e
          RESULTS=$(grep -rn \
            "sk_live_\|whsec_\|password.*=.*['\"][a-zA-Z0-9]\|api_key.*=.*['\"][a-zA-Z0-9]\|secret.*=.*['\"][a-zA-Z0-9]\|AKIA[0-9A-Z]\|-----BEGIN.*PRIVATE" \
            services/api/src \
            --include="*.ts" \
            | grep -v "\.spec\.ts" \
            | grep -v "\.env\.example" \
            | grep -v "placeholder" \
            | grep -v "your-secret\|your-key\|example\|test-secret\|ci-" \
            || true)

          COUNT=0
          if [ -n "$RESULTS" ]; then
            COUNT=$(echo "$RESULTS" | grep -c "." || true)
          fi

          echo "## Security Scan — Hardcoded Secrets" >> $GITHUB_STEP_SUMMARY
          if [ "$COUNT" -gt 0 ]; then
            echo "⚠️ **$COUNT potential hardcoded secret patterns detected** (warning only — review manually):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$RESULTS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::$COUNT potential hardcoded secret patterns found in services/api/src. Review the lines above and confirm they are not real credentials."
          else
            echo "✅ No hardcoded secret patterns detected." >> $GITHUB_STEP_SUMMARY
          fi
          # Warning only — does not fail the PR
          exit 0

  # ── Schema Validation ──────────────────────────────────────────────────────
  schema-validation:
    name: Prisma Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: |
          pnpm exec prisma validate
          echo "## Prisma Schema Validation" >> $GITHUB_STEP_SUMMARY
          echo "✅ schema.prisma is valid" >> $GITHUB_STEP_SUMMARY

      - name: Count migrations
        run: |
          MIGRATION_COUNT=$(find services/api/prisma/migrations -name "migration.sql" 2>/dev/null | wc -l)
          echo "Total applied migrations: $MIGRATION_COUNT" >> $GITHUB_STEP_SUMMARY

  # ── Spec Coverage Report ───────────────────────────────────────────────────
  spec-coverage:
    name: Spec Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count spec files and test blocks
        id: spec-count
        run: |
          SPEC_FILES=$(find services/api/src -name "*.spec.ts" 2>/dev/null | wc -l)
          INTEGRATION_FILES=$(find services/api/test/integration -name "*.test.ts" 2>/dev/null | wc -l)
          TEST_IT_COUNT=$(grep -r "^\s*it\(" services/api/src --include="*.spec.ts" 2>/dev/null | wc -l || echo 0)
          DESCRIBE_COUNT=$(grep -r "^\s*describe\(" services/api/src --include="*.spec.ts" 2>/dev/null | wc -l || echo 0)
          INTEGRATION_TEST_COUNT=$(grep -r "^\s*it\(" services/api/test/integration --include="*.test.ts" 2>/dev/null | wc -l || echo 0)
          SRC_FILES=$(find services/api/src -name "*.ts" -not -name "*.spec.ts" -not -path "*/node_modules/*" 2>/dev/null | wc -l)

          echo "## Spec Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source files (.ts, non-spec) | $SRC_FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit spec files (.spec.ts) | $SPEC_FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration test files (.test.ts) | $INTEGRATION_FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit \`it()\` blocks | $TEST_IT_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| \`describe()\` suites | $DESCRIBE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration \`it()\` blocks | $INTEGRATION_TEST_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$INTEGRATION_FILES" -lt 5 ]; then
            echo "::warning::Only $INTEGRATION_FILES integration test files found. The deploy gate requires at least 5."
          fi

  # ── Dependency Audit ───────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (High Severity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (fail on high severity)
        run: |
          set +e
          pnpm audit --audit-level=high 2>&1 | tee /tmp/audit-output.txt
          AUDIT_EXIT=$?

          echo "## Dependency Audit" >> $GITHUB_STEP_SUMMARY
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "❌ **High-severity vulnerabilities detected:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/audit-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::error::pnpm audit found high-severity vulnerabilities. Resolve them before merging."
            exit 1
          else
            echo "✅ No high-severity vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: false
